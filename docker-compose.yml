version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.be
    container_name: spring_backend
    restart: always
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Kết nối tới MySQL trên máy Windows của bạn
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/FlightTicket?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Lamdv(156404)
      - AI_API_KEY=${AI_API_KEY}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.fe.dev
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./fe:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
