services:
  # Spring Boot Backend Service
  - type: web
    name: flight-backend
    env: docker
    dockerfilePath: Dockerfile.be
    plan: free
    region: singapore
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: flight-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: flight-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: flight-db
          property: password
      - key: AI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - key: MAIL_USERNAME
        value: huudzung1072005@gmail.com
      - key: MAIL_PASSWORD
        value: dwdekjtahyrdjqss

  # React Frontend (Static Site)
  - type: web
    name: flight-frontend
    env: static
    buildCommand: cd fe && npm install && npm run build
    staticPublishPath: fe/dist
    envVars:
      - key: VITE_API_URL
        value: https://flight-backend.onrender.com

databases:
  - name: flight-db
    databaseName: flight_ticket
    user: flight_user
    plan: free
    region: singapore
