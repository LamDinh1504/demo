services:
  # MySQL Database Service
  - type: web
    name: mysql-db
    env: docker
    dockerfilePath: Dockerfile.mysql
    plan: free
    region: singapore
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: Lamdv(156404)
      - key: MYSQL_DATABASE
        value: FlightTicket


  # Spring Boot Backend Service
  - type: web
    name: flight-backend
    env: docker
    dockerfilePath: Dockerfile.be
    plan: free
    region: singapore
    envVars:
